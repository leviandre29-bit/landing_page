<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
</head>
<body>
    <div class="header">
        <h1 class="logo">Header Logo</h1>
        <div class="links">
            <a href="https://www.youtube.com">header link one</a>
            <a href="https://www.youtube.com">header link two</a>
            <a href="https://www.youtube.com">header link three</a>
        </div>
    </div>
    <div class="hero">
        <div class="hero-content">
            <div class="hero-left">
                <div class="hero-text">
                    <p class="main-title">This website is awesome!</p>
                    <div class="subtext-container">
                        <p class="subtext">This website has some subtext that goes here under the main title. It's a smaller font and the color is lower contrast.</p>
                    </div>
                </div>
                <button class="button">Sign up</button>
            </div>
            <div class="image">This is a placeholder for an image</div>
        </div>
    </div>
</body>
</html>
